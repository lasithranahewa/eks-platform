# argo-cd-apps/applications/online-boutique.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: devops-alerts
spec:
  project: applications
  source:
    repoURL: https://github.com/lasithranahewa/eks-platform
    targetRevision: main
    path: helm-charts/online-boutique
    helm:
      valueFiles:
        - values.yaml
        # Use overlay for environment-specific values:
        # - ../../kubernetes/overlays/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: boutique
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true  # Only sync changed resources
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5