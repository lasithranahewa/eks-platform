# helm-charts/observability/values-local.yaml
# Lightweight values for local development

kube-prometheus-stack:
  grafana:
    enabled: true
    adminPassword: "admin"  # Change in production
    persistence:
      enabled: false  # No persistence needed locally
    service:
      type: NodePort
      nodePort: 30000
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Viewer
    # Pre-load dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'custom'
            orgId: 1
            folder: 'Custom'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/custom

  prometheus:
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      storageSpec: {}  # No persistence locally

  alertmanager:
    enabled: true
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi

loki:
  enabled: true
  loki:
    auth_enabled: false
    storage:
      type: filesystem
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: loki_index_
            period: 24h

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push