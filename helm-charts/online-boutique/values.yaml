global:
  imageRegistry: ""
  imagePullSecrets: []

images:
  repository: gcr.io/google-samples/microservices-demo
  tag: "v0.9.0"

# ─── Per-service configuration ────────────────────────────────────────────────
frontend:
  name: frontend
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/frontend
    tag: "v0.9.0"
    pullPolicy: IfNotPresent
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  nodeSelector:
    workload-type: application
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: boutique.l4sith.dev
        paths:
          - path: /
            pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
  virtualService:
    create: false

cartService:
  name: cartservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/cartservice
    tag: "v0.9.0"
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 128Mi

productCatalogService:
  name: productcatalogservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/productcatalogservice
    tag: "v0.9.0"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

currencyService:
  name: currencyservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/currencyservice
    tag: "v0.9.0"
  replicas: 1

paymentService:
  name: paymentservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/paymentservice
    tag: "v0.9.0"
  replicas: 1

shippingService:
  name: shippingservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/shippingservice
    tag: "v0.9.0"
  replicas: 1

emailService:
  name: emailservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/emailservice
    tag: "v0.9.0"
  replicas: 1

checkoutService:
  name: checkoutservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/checkoutservice
    tag: "v0.9.0"
  replicas: 1

recommendationService:
  name: recommendationservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/recommendationservice
    tag: "v0.9.0"
  replicas: 1

adService:
  name: adservice
  create: true
  image:
    repository: gcr.io/google-samples/microservices-demo/adservice
    tag: "v0.9.0"
  replicas: 1

# ─── Redis ─────────────────────────────────────────────────────────────────────
inClusterRedis:
  create: true
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.2-alpine"
  resources:
    requests:
      cpu: 70m
      memory: 200Mi

# ─── Load Generator ────────────────────────────────────────────────────────────
loadGenerator:
  name: loadgenerator
  create: true
  enabled: true  # Enable in non-prod to generate traffic
  image:
    repository: gcr.io/google-samples/microservices-demo/loadgenerator
    tag: "v0.9.0"
  users: 10

# ─── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  serviceMonitor:
    enabled: false  # Enable when Prometheus is installed
    namespace: monitoring

# ─── Security ─────────────────────────────────────────────────────────────────
securityContext:
  enable: false

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

seccompProfile:
  enable: false
  type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─── Upstream Google Chart Requirements ───────────────────────────────────────
opentelemetryCollector:
  name: opentelemetrycollector
  create: false
networkPolicies:
  create: false
serviceAccounts:
  create: false
authorizationPolicies:
  create: false

googleCloudOperations:
  profiler: false
  tracing: false
  metrics: false

cartDatabase:
  type: "redis"
  connectionString: "redis-cart:6379"
  inClusterRedis:
    create: true
    name: redis-cart
    publicRepository: true
  externalRedisTlsOrigination:
    enable: false

shoppingAssistantService:
  name: shoppingassistantservice
  create: false

sidecars:
  create: false

